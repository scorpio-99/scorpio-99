name: Update Contribution Graph

on:
  schedule:
    - cron: "0 2 * * *" # daily at 02:00 UTC
  workflow_dispatch: # allow manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate contribution graph
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: scorpio-99
          outputs: |
            assets/github-contribution-graph.svg?palette=github-dark

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/github-contribution-graph.svg
          git diff --staged --quiet || git commit -m "chore: update contribution graph" && git push
