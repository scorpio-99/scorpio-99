name: Update Profile README

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 2 * * *" # daily at 02:00 UTC
  workflow_dispatch: # allow manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate contribution graph
        run: python scripts/generate_contributions.py

      - name: Generate tech stack
        run: python scripts/generate_tech_stack.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/generated/github-contribution-graph.svg assets/generated/github-tech-stack.svg
          git diff --staged --quiet || (git commit -m "chore: update profile README assets" && git push)
